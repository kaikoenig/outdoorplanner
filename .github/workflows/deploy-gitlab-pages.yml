name: Deploy to GitLab Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare GitLab Pages deploy repo
        run: |
          set -e
          rm -rf deploy_repo
          mkdir -p deploy_repo/public
          cp -r dist/. deploy_repo/public/
          cp deploy/gitlab-ci.yml deploy_repo/.gitlab-ci.yml

          cd deploy_repo
          git init -q
          git checkout -q -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${{ github.sha }}"

      - name: Push to GitLab
        env:
          GITLAB_DEPLOY_TOKEN: ${{ secrets.GITLAB_DEPLOY_TOKEN }}
          GITLAB_REPO: ${{ secrets.GITLAB_REPO }}
        run: |
          set -e
          cd deploy_repo
          git remote add gitlab "https://gitlab-ci-token:${GITLAB_DEPLOY_TOKEN}@gitlab.com/${GITLAB_REPO}.git"
          git push --force gitlab main
